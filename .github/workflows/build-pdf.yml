name: Build PDF

on:
  push:
    branches:
      - main

jobs:
  build_pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install LaTeX
        run: sudo apt-get install -y texlive-xetex

      - name: Generate PDF
        run: |
          pandoc \
          docs/01-overview.md \
          docs/02-authentication.md \
          docs/03-api-reference.md \
          docs/04-release-notes.md \
          -o documentation.pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: documentation.pdf
